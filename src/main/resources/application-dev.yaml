# =============================================================================
# 团队 dev 共享环境 Profile - 启动:
#   SPRING_PROFILES_ACTIVE=dev java -jar app.jar
# 或容器里通过环境变量注入。
#
# 目的: 部署在 dev 服务器/K8s 上, DB/Redis 指向共享 dev 实例;
#   所有敏感字段强制通过环境变量注入, yaml 不留明文。
#
# 如果任一必需环境变量缺失, 应用在 Spring 解析占位符时启动失败 —— 这是故意的。
# =============================================================================
server:
  port: ${SERVER_PORT:8089}
  
spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://dev-db.example.com:5432/sea_star_ai}
    username: ${DB_USERNAME:connector_dev}
    password: ${DB_PASSWORD}       # 无默认, 必须注入
    hikari:
      maximum-pool-size: 20
      connection-timeout: 3000
  data:
    redis:
      host: ${REDIS_HOST:dev-redis.example.com}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000

connector:
  security:
    mcp-token: ${MCP_AUTH_TOKEN}         # 强制注入
    admin-api-key: ${ADMIN_API_KEY}      # 强制注入
    admin-purge-api-key: ${ADMIN_PURGE_API_KEY}  # 强制注入, 物理删端点二级认证
    encryption-key: ${ENCRYPTION_KEY}    # 强制注入, 覆盖主 yaml 的 dev 默认
  async:
    callback:
      inbound-secret: ${CALLBACK_INBOUND_SECRET}

logging:
  level:
    root: INFO
    com.sea.star.ai.ec.enterprise.connector: INFO
    # dev 环境不打印完整 SQL, 避免日志刷屏
    com.baomidou.mybatisplus: WARN
